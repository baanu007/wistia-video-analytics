name: wistia-pipeline-ci-cd

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff (non-blocking)
        run: ruff check glue_jobs/ tests/ || echo "Lint issues found (non-blocking)"

      - name: Run unit tests
        run: pytest tests/ -v

      - name: Shell-script syntax check
        run: bash -n scripts/*.sh

  deploy-code:
    name: Deploy Glue scripts to AWS
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload Glue scripts + refresh jobs
        # We don't run setup.sh in CI (infrastructure changes are rare and
        # done manually by an admin). CI only deploys new code by syncing
        # the Glue Python scripts to S3.
        env:
          # common.sh falls back to aws env vars if AWS_PROFILE is unset
          AWS_PROFILE: ""
        run: bash scripts/deploy-code.sh
