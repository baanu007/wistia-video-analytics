# wistia-pipeline-ci-cd
#
# This workflow has two jobs:
#   1. lint-and-test  -- runs on every PR + push to main (safe, no secrets).
#   2. deploy-code    -- manual trigger ONLY (workflow_dispatch).
#
# The deploy job requires the following GitHub Secrets to be configured:
#   - AWS_ACCESS_KEY_ID
#   - AWS_SECRET_ACCESS_KEY
#   - SCRIPTS_BUCKET     (e.g. "wistia-analytics-scripts-<account-id>")
#   - GLUE_ROLE_ARN      (optional, if downstream steps need it)
#
# Why manual-only deploy?
#   Auto-deploy on push-to-main was failing every push because the AWS
#   secrets above were not configured in this repo, and the runtime logs
#   of the failures were exposing internal infrastructure details (bucket
#   names containing the AWS account ID) in the public Actions log.
#   Switching to workflow_dispatch prevents accidental deploys without
#   proper secrets configured and stops information leakage via failed
#   CI runs.

name: wistia-pipeline-ci-cd

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:  # manual trigger for the deploy-code job

env:
  AWS_REGION: us-east-1

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff (non-blocking)
        run: ruff check glue_jobs/ tests/ || echo "Lint issues found (non-blocking)"

      - name: Run unit tests
        run: pytest tests/ -v

      - name: Shell-script syntax check
        run: bash -n scripts/*.sh

  deploy-code:
    name: Deploy Glue scripts to AWS
    runs-on: ubuntu-latest
    # Manual trigger only -- prevents accidental deploys without proper
    # secrets configured. See header comment for required secrets.
    if: github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload Glue scripts + refresh jobs
        # We don't run setup.sh in CI (infrastructure changes are rare and
        # done manually by an admin). CI only deploys new code by syncing
        # the Glue Python scripts to S3.
        env:
          AWS_PROFILE: ""
          # SCRIPTS_BUCKET is consumed by scripts/deploy-code.sh via common.sh.
          SCRIPTS_BUCKET: ${{ secrets.SCRIPTS_BUCKET }}
        run: bash scripts/deploy-code.sh
